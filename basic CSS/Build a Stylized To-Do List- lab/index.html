<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stylized To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>My Tasks</h1>
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="task-1" />
          <label for="task-1"> Explore gaming keyboards</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://store.com" target="_blank">Store link</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="task-2" />
          <label for="task-2"> Finish the report</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://freecodecamp.org" target="_blank">Request Access</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="task-3" />
          <label for="task-3">View Phone's Warranty</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://netlify.com" target="_blank">View Receipts</a></li>
          </ul>
        </li>
        <li>
          <input type="checkbox" id="task-4" />
          <label for="task-4">Check Processor Specs</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="https://youtube.com" target="_blank">View Model Number</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
